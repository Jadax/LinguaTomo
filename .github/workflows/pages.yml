name: Prepare Web Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out private source
        uses: actions/checkout@v6
      - name: Install Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Build deployment-only website
        run: >-
          flutter build web --release --no-wasm-dry-run
          --base-href "/LinguaTomo-Web/"
          --dart-define=SUPABASE_URL=https://lfoczkivkesxxmuowebm.supabase.co
          --dart-define=SUPABASE_PUBLISHABLE_KEY=sb_publishable_NGm5Y-8u5SwycozyfhyYjw_keRVTpka
      - name: Upload compiled website
        uses: actions/upload-artifact@v7
        with:
          name: linguatomo-web
          path: build/web
          retention-days: 14
      - name: Configure restricted deployment key
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.LINGUATOMO_WEB_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/linguatomo_web
          chmod 600 ~/.ssh/linguatomo_web
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/linguatomo_web -o IdentitiesOnly=yes"
      - name: Publish compiled site only
        shell: bash
        run: |
          git clone git@github.com:Jadax/LinguaTomo-Web.git deploy
          rsync -a --delete --exclude='.git/' build/web/ deploy/
          touch deploy/.nojekyll
          cd deploy
          git config user.name "LinguaTomo Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "deploy: LinguaTomo ${GITHUB_SHA::7}"
          git push origin main
