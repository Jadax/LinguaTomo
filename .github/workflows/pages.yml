name: Publish Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Build Web release
        run: >-
          flutter build web --release --no-wasm-dry-run
          --base-href "/LinguaTomo/"
          --dart-define=SUPABASE_URL=https://lfoczkivkesxxmuowebm.supabase.co
          --dart-define=SUPABASE_PUBLISHABLE_KEY=sb_publishable_NGm5Y-8u5SwycozyfhyYjw_keRVTpka
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Web artefact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
