name: linguatomo
description: LinguaTomo, a warm Japanese learning companion by Tushant Sharma and Astraiva.
publish_to: none
version: 1.13.0+18

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_svg: ^2.3.0
  image_picker: ^1.2.3
  google_mlkit_text_recognition: ^0.16.0
  share_plus: ^13.2.1
  fsrs: ^2.0.1
  supabase_flutter: ^2.16.0
  flutter_tts: ^4.2.5
  connectivity_plus: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/leo-cheer.png
    - assets/branding/leo-nest-fireplace.png
    - assets/branding/leo-nest-room.png
    - assets/branding/nest-home-pixel.png
    - assets/branding/nest-journey-pixel.png
    - assets/branding/nest-japan-pixel.png
    - assets/branding/nest-spring-pixel.png
    - assets/branding/nest-winter-pixel.png
    - assets/branding/leo-face-icon.png
    - assets/branding/leo-sprites.png
    - assets/content/grammar/
